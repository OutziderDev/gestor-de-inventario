<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bazar">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <title>Bazar - Historial</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Bazar de Ventas</h1>
      <p>Historial de ventas</p>
      <nav>
        <a href="index.html">Inventario</a>
        <a href="historial.html" class="active">Historial</a>
      </nav>
    </header>

    <div class="inventario-list" id="lista-historial">
      <div class="empty-state">
        <div class="icon">&#128221;</div>
        <p>Cargando historial...</p>
      </div>
    </div>

    <div class="historial-resumen hidden" id="historial-resumen">
      <div class="resumen-row">
        <span class="resumen-label">Total vendido</span>
        <span class="resumen-valor" id="historial-total">$ 0.00</span>
      </div>
      <div class="resumen-row">
        <span class="resumen-label">Articulos despachados</span>
        <span class="resumen-valor resumen-cantidad" id="historial-cantidad-total">0</span>
      </div>
      <div class="resumen-row">
        <span class="resumen-label">Cash</span>
        <span class="resumen-valor resumen-cash" id="historial-total-cash">$ 0.00</span>
      </div>
      <div class="resumen-row">
        <span class="resumen-label">Yappy</span>
        <span class="resumen-valor resumen-yappy" id="historial-total-yappy">$ 0.00</span>
      </div>
    </div>
  </div>

  <script src="js/historial.js"></script>
</body>
</html>
